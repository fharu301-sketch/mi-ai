<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private AI Generator</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #ff4081; font-size: 24px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 12px; margin-top: 5px; background-color: #222; color: #fff; border: 1px solid #444; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 15px; margin-top: 20px; background-color: #ff4081; color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #555; }
        .result-box { margin-top: 25px; text-align: center; }
        img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: none; }
        .status { margin-top: 10px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Private AI</h1>
    
    <label>① 呪文（プロンプト）</label>
    <textarea id="prompt" rows="4" placeholder="英語で入力（例: 1girl, beautiful, nsfw, bikini...）">1girl, solo, masterpiece, beautiful, nsfw,</textarea>
    
    <label>② 除外ワード（ネガティブ）</label>
    <textarea id="negative" rows="2">bad anatomy, low quality, blurry</textarea>

    <button id="generate-btn" onclick="generateImage()">画像を生成する</button>
    
    <div class="result-box">
        <div id="status" class="status"></div>
        <img id="result-image" src="" alt="Generated AI Image">
    </div>
</div>

<script>
    const NOVITA_KEY = "sk_kebyLa2DNoekQ6WFultHE_MZ2PFyYNF8hD8-ynpm4yE"; 

    async function generateImage() {
        const promptInput = document.getElementById("prompt").value;
        const negativeInput = document.getElementById("negative").value;
        const btn = document.getElementById("generate-btn");
        const statusDiv = document.getElementById("status");
        const resultImg = document.getElementById("result-image");

        btn.disabled = true;
        statusDiv.innerText = "AIが画像を生成中...（約10〜15秒かかります）";
        resultImg.style.display = "none";

        try {
            const response = await fetch("https://novita.ai", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${NOVITA_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    request: {
                        model_name: "chilloutmix_NiPrunedFp32Fix_20245.safetensors",
                        prompt: promptInput,
                        negative_prompt: negativeInput,
                        width: 512,
                        height: 768,
                        image_num: 1,
                        steps: 20,
                        seed: -1,
                        clip_skip: 2,
                        guidance_scale: 7.5
                    }
                })
            });

            const data = await response.json();
            console.log("Novita API Response:", data); // デバッグ用ログ
            
            // 💡 どんなデータ構造で返ってきても画像URLを引っ張り出せるように強化しました
            let imageUrl = null;
            if (data && data.images && data.images.length > 0) {
                imageUrl = data.images[0].image_url || data.images[0].url || data.images[0];
            } else if (data && data.data && data.data.images && data.data.images.length > 0) {
                imageUrl = data.data.images[0].image_url || data.data.images[0].url;
            }
            
            if (imageUrl) {
                showImage(imageUrl);
            } else {
                throw new Error("画像URLが見つかりません");
            }

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "エラーが発生しました。設定や呪文を確認してください。";
            btn.disabled = false;
        }
    }

    function showImage(url) {
        const statusDiv = document.getElementById("status");
        const resultImg = document.getElementById("result-image");
        const btn = document.getElementById("generate-btn");

        statusDiv.innerText = "完成しました！画像を長押しで保存できます。";
        resultImg.src = url;
        resultImg.style.display = "block";
        btn.disabled = false;
    }
</script>
</body>
</html>
